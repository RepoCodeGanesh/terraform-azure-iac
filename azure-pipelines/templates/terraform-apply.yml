parameters:
  - name: workingDirectory
    type: string
  - name: environmentName
    type: string
  - name: azureSubscriptionName
    type: string

steps:
- task: AzureCLI@2
  displayName: 'Terraform apply - ${{ parameters.environmentName }}'
  inputs:
    azureSubscription: ${{ parameters.azureSubscriptionName }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      terraform -chdir=${{ parameters.workingDirectory }} apply -auto-approve -var-file=environments/${{ parameters.environmentName }}/terraform.tfvars tfplan.out
