parameters:
  - name: path
    type: string

steps:
- bash: |
    set -euo pipefail
    echo "Detecting changed Terraform targets under ${{ parameters.path }}"

    if [ -n "${SYSTEM_PULLREQUEST_TARGETBRANCH:-}" ]; then
      git fetch origin "$SYSTEM_PULLREQUEST_TARGETBRANCH" --depth=1 || true
    fi

    CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
    if [ -z "$CHANGED_FILES" ]; then
      CHANGED_FILES=$(git diff --name-only "$(Build.SourceVersion)" "$(Build.SourceVersion)^" 2>/dev/null || true)
    fi
    if [ -z "$CHANGED_FILES" ]; then
      CHANGED_FILES=$(git ls-files)
    fi

    TARGETS=""
    for file in $CHANGED_FILES; do
      case "$file" in
        hub/*) TARGETS="$TARGETS hub" ;;
        app1/*) TARGETS="$TARGETS app1" ;;
        app2/*) TARGETS="$TARGETS app2" ;;
        modules/*) TARGETS="$TARGETS hub app1 app2" ;;
      esac
    done

    TARGETS=$(echo "$TARGETS" | tr ' ' '\n' | awk '!seen[$0]++' | paste -sd ' ' -)
    echo "Detected targets: $TARGETS"
    echo "##vso[task.setvariable variable=terraformTargets;isOutput=true]$TARGETS"
  displayName: Detect changed Terraform targets
  name: detect_changes
