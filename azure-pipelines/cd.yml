trigger: none

pr: none

parameters:
- name: environmentName
  displayName: Environment
  type: string
  default: dev
  values:
    - dev
    - staging
    - prod

variables:
  TF_BACKEND_STORAGE_ACCOUNT: htcusdevstate01
  TF_BACKEND_CONTAINER: tfstate

jobs:
- deployment: DeployTerraform
  displayName: 'Deploy Terraform to ${{ parameters.environmentName }}'
  environment: ${{ parameters.environmentName }}
  pool:
    vmImage: ubuntu-latest
  strategy:
    runOnce:
      deploy:
        steps:
        - checkout: self
        - template: templates/terraform-init.yml
          parameters:
            workingDirectory: .
            environmentName: ${{ parameters.environmentName }}
            backendResourceGroup: ${{ parameters.environmentName == 'dev' && 'ht-centralindia-dev-rg-hub-01' || parameters.environmentName == 'staging' && 'ht-centralindia-staging-rg-hub-01' || 'ht-centralindia-prod-rg-hub-01' }}
        - template: templates/terraform-apply.yml
          parameters:
            workingDirectory: .
            environmentName: ${{ parameters.environmentName }}
