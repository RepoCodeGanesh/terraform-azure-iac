trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  AZURE_SERVICE_CONNECTION: "dev"
  TF_WORKING_DIR: "."
  BACKEND_RESOURCE_GROUP: "ht-cind-dev-rg-hub-01"
  BACKEND_STORAGE_ACCOUNT: "htcinddevsahub02"
  BACKEND_CONTAINER: "tfstate"
  BACKEND_KEY: "cindia-dev-root.tfstate"
  SUBSCRIPTION_ID: "859a785c-bd38-402d-b595-1f44f40fb9bf"
  TENANT_ID: "4cef0d84-84d6-4ed0-8abe-773b015bcf99"
  KEY_VAULT_NAME: ""

steps:
  - script: |
      set -euo pipefail
      sudo apt-get update
      sudo apt-get install -y gnupg software-properties-common
      wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg >/dev/null
      echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
      sudo apt-get update
      sudo apt-get install -y terraform
      terraform version
    displayName: "Install Terraform"

  - task: AzureCLI@2
    displayName: "Preflight hub check"
    inputs:
      azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail
        bash scripts/preflight-hub-check.sh \
          --subscription "$(SUBSCRIPTION_ID)" \
          --hub-rg "$(BACKEND_RESOURCE_GROUP)" \
          --storage "$(BACKEND_STORAGE_ACCOUNT)" \
          --container "$(BACKEND_CONTAINER)"

  - task: AzureCLI@2
    displayName: "Terraform fmt, init, validate"
    inputs:
      azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail
        az account set --subscription "$(SUBSCRIPTION_ID)"
        terraform fmt -check -recursive
        terraform init \
          -backend-config="resource_group_name=$(BACKEND_RESOURCE_GROUP)" \
          -backend-config="storage_account_name=$(BACKEND_STORAGE_ACCOUNT)" \
          -backend-config="container_name=$(BACKEND_CONTAINER)" \
          -backend-config="key=$(BACKEND_KEY)" \
          -backend-config="use_azuread_auth=true"
        terraform validate
    env:
      ARM_SUBSCRIPTION_ID: "$(SUBSCRIPTION_ID)"
      ARM_TENANT_ID: "$(TENANT_ID)"

  - script: |
      set -euo pipefail
      bash scripts/list-targets.sh > deployment-targets.json
      cat deployment-targets.json
    displayName: "List deployment targets"

  - task: PublishBuildArtifacts@1
    displayName: "Publish deployment target list"
    inputs:
      pathToPublish: "deployment-targets.json"
      artifactName: "deployment-targets"
      publishLocation: "Container"
