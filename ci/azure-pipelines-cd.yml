trigger: none
pr: none

resources:
  pipelines:
    - pipeline: ciBuild
      source: "terraform-iac-ci"
      trigger: none

parameters:
  - name: deployHub
    displayName: "Deploy hub network"
    type: boolean
    default: false

  - name: deployStaticWebApi
    displayName: "Deploy staticwebapi"
    type: boolean
    default: false

  - name: deployServerless
    displayName: "Deploy serverless"
    type: boolean
    default: false

  - name: deploySecureMs
    displayName: "Deploy securems"
    type: boolean
    default: false

variables:
  AZURE_SERVICE_CONNECTION: "dev"
  TF_WORKING_DIR: "."
  BACKEND_RESOURCE_GROUP: "ht-cind-dev-rg-hub-01"
  BACKEND_STORAGE_ACCOUNT: "htcinddevsahub02"
  BACKEND_CONTAINER: "tfstate"
  BACKEND_KEY: "cindia-dev-root.tfstate"
  SUBSCRIPTION_ID: "859a785c-bd38-402d-b595-1f44f40fb9bf"
  TENANT_ID: "4cef0d84-84d6-4ed0-8abe-773b015bcf99"

stages:
  - stage: Plan
    displayName: "Terraform plan"
    jobs:
      - job: PlanTargets
        displayName: "Plan selected targets"
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - script: |
              set -euo pipefail
              sudo apt-get update
              sudo apt-get install -y gnupg software-properties-common
              wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg >/dev/null
              echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
              sudo apt-get update
              sudo apt-get install -y terraform
              terraform version
            displayName: "Install Terraform"

          - script: |
              set -euo pipefail
              : > selected-targets.txt
              if [ "${{ parameters.deployHub }}" = "true" ]; then echo "hub" >> selected-targets.txt; fi
              if [ "${{ parameters.deployStaticWebApi }}" = "true" ]; then echo "staticwebapi" >> selected-targets.txt; fi
              if [ "${{ parameters.deployServerless }}" = "true" ]; then echo "serverless" >> selected-targets.txt; fi
              if [ "${{ parameters.deploySecureMs }}" = "true" ]; then echo "securems" >> selected-targets.txt; fi
              if [ ! -s selected-targets.txt ]; then
                echo "No targets selected. Select at least one target."
                exit 1
              fi
              echo "Selected targets:"
              cat selected-targets.txt
            displayName: "Build selected target list"

          - task: AzureCLI@2
            displayName: "Terraform plan selected targets"
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az account set --subscription "$(SUBSCRIPTION_ID)"
                mkdir -p tfplans
                while read -r target_name; do
                  [ -n "${target_name}" ] || continue
                  bash scripts/run-target.sh \
                    --target "${target_name}" \
                    --action plan \
                    --backend-rg "$(BACKEND_RESOURCE_GROUP)" \
                    --backend-account "$(BACKEND_STORAGE_ACCOUNT)" \
                    --backend-container "$(BACKEND_CONTAINER)" \
                    --backend-key "$(BACKEND_KEY)" \
                    --plan-dir tfplans
                done < selected-targets.txt
            env:
              ARM_SUBSCRIPTION_ID: "$(SUBSCRIPTION_ID)"
              ARM_TENANT_ID: "$(TENANT_ID)"

          - publish: selected-targets.txt
            artifact: selected-targets

          - publish: tfplans
            artifact: tfplans

  - stage: Approval
    displayName: "Approve deployment"
    dependsOn: Plan
    condition: succeeded()
    jobs:
      - job: ManualApproval
        displayName: "Review plan and approve"
        pool: server
        steps:
          - task: ManualValidation@0
            inputs:
              notifyUsers: ""
              instructions: "Review the Terraform plan output from the Plan stage. Approve to apply the selected hub/app targets."

  - stage: Deploy
    displayName: "Terraform apply"
    dependsOn: Approval
    condition: succeeded()
    jobs:
      - deployment: DeployTargets
        displayName: "Apply selected targets"
        environment: "dev"
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: selected-targets

                - download: current
                  artifact: tfplans

                - script: |
                    set -euo pipefail
                    sudo apt-get update
                    sudo apt-get install -y gnupg software-properties-common
                    wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg >/dev/null
                    echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
                    sudo apt-get update
                    sudo apt-get install -y terraform
                    terraform version
                  displayName: "Install Terraform"

                - task: AzureCLI@2
                  displayName: "Terraform apply selected targets"
                  inputs:
                    azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      az account set --subscription "$(SUBSCRIPTION_ID)"
                      while read -r target_name; do
                        [ -n "${target_name}" ] || continue
                        bash scripts/run-target.sh \
                          --target "${target_name}" \
                          --action apply \
                          --backend-rg "$(BACKEND_RESOURCE_GROUP)" \
                          --backend-account "$(BACKEND_STORAGE_ACCOUNT)" \
                          --backend-container "$(BACKEND_CONTAINER)" \
                          --backend-key "$(BACKEND_KEY)" \
                          --plan-dir "$(Pipeline.Workspace)/tfplans"
                      done < "$(Pipeline.Workspace)/selected-targets/selected-targets.txt"
                  env:
                    ARM_SUBSCRIPTION_ID: "$(SUBSCRIPTION_ID)"
                    ARM_TENANT_ID: "$(TENANT_ID)"
