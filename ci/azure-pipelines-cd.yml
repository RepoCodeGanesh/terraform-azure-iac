trigger: none
pr: none

resources:
  pipelines:
    - pipeline: ciBuild
      source: "CI Pipeline Name"
      trigger: none

variables:
  AZURE_SERVICE_CONNECTION: "dev"
  TF_WORKING_DIR: "."
  BACKEND_RESOURCE_GROUP: "ht-cind-dev-rg-hub-01"
  BACKEND_STORAGE_ACCOUNT: "htcinddevsahub02"
  BACKEND_CONTAINER: "tfstate"
  BACKEND_KEY: "cindia-dev-root.tfstate"
  SUBSCRIPTION_ID: "859a785c-bd38-402d-b595-1f44f40fb9bf"
  TENANT_ID: "4cef0d84-84d6-4ed0-8abe-773b015bcf99"
  SELECTED_TARGETS: "all"

stages:
  - stage: Prepare
    displayName: "Prepare deployment selection"
    jobs:
      - job: ValidateSelection
        displayName: "Validate selected targets"
        pool:
          vmImage: ubuntu-latest
        steps:
          - download: ciBuild
            artifact: deployment-targets

          - script: |
              set -euo pipefail
              cp "$(Pipeline.Workspace)/ciBuild/deployment-targets/deployment-targets.json" deployment-targets.json
              echo "Available deployment targets:"
              jq -r '.[]' deployment-targets.json
              echo "Requested targets: $(SELECTED_TARGETS)"
              bash scripts/validate-targets.sh --selected "$(SELECTED_TARGETS)" --targets-json deployment-targets.json > selected-targets.txt
              echo "Validated targets:"
              cat selected-targets.txt
            displayName: "Validate queue-time selection"

          - publish: selected-targets.txt
            artifact: selected-targets

      - job: Approval
        displayName: "Manual approval"
        dependsOn: ValidateSelection
        pool: server
        steps:
          - task: ManualValidation@0
            inputs:
              notifyUsers: ""
              instructions: "Approve deployment of the targets selected in SELECTED_TARGETS. Use all, hub, or a comma-separated list such as staticwebapi,serverless."

  - stage: Deploy
    displayName: "Deploy selected targets"
    dependsOn: Prepare
    condition: succeeded()
    jobs:
      - deployment: DeployTargets
        displayName: "Terraform apply for selected targets"
        environment: "dev"
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: selected-targets

                - script: |
                    set -euo pipefail
                    sudo apt-get update
                    sudo apt-get install -y gnupg software-properties-common
                    wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg >/dev/null
                    echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
                    sudo apt-get update
                    sudo apt-get install -y terraform
                    terraform version
                  displayName: "Install Terraform"

                - task: AzureCLI@2
                  displayName: "Apply selected targets"
                  inputs:
                    azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      az account set --subscription "$(SUBSCRIPTION_ID)"
                      while read -r target_name; do
                        [ -n "${target_name}" ] || continue
                        bash scripts/run-target.sh \
                          --target "${target_name}" \
                          --action apply \
                          --backend-rg "$(BACKEND_RESOURCE_GROUP)" \
                          --backend-account "$(BACKEND_STORAGE_ACCOUNT)" \
                          --backend-container "$(BACKEND_CONTAINER)" \
                          --backend-key "$(BACKEND_KEY)"
                      done < "$(Pipeline.Workspace)/selected-targets/selected-targets.txt"
                  env:
                    ARM_SUBSCRIPTION_ID: "$(SUBSCRIPTION_ID)"
                    ARM_TENANT_ID: "$(TENANT_ID)"
